<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Perpus | SMAN 1 Lemahabang</title>

    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@600;800&family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:'Plus Jakarta Sans', sans-serif;
            background:#0f1117;
            color:white;
            min-height:100vh;
            overflow-x:hidden;
            position:relative;
        }

        .particles{
            position:fixed;
            width:100%;
            height:100%;
            overflow:hidden;
            z-index:0;
            pointer-events:none;
        }

        .particles span{
            position:absolute;
            width:3px;
            height:3px;
            background:rgba(255,255,255,0.08);
            border-radius:50%;
            animation:float 12s linear infinite;
        }

        @keyframes float{
            0%{transform:translateY(100vh);opacity:0;}
            10%{opacity:1;}
            100%{transform:translateY(-100px);opacity:0;}
        }

        .app-container{
            position:relative;
            z-index:2;
            width:100%;
            max-width:700px;
            margin:auto;
            padding:20px;
        }

        .panel{display:none;}
        .panel.active{display:block;}

        .portal-title{
            text-align:center;
            font-family:'Outfit', sans-serif;
            font-size:52px;
            margin-top:40px;
        }

        .menu-main{
            margin-top:40px;
            display:flex;
            flex-direction:column;
            gap:15px;
        }

        button{
            border:none;
            cursor:pointer;
            padding:15px;
            border-radius:14px;
            font-weight:700;
        }

        .btn-primary{
            background:#3b82f6;
            color:white;
        }

        .btn-secondary{
            background:#1f2937;
            color:white;
        }
    </style>
</head>
<body>

<div class="particles">
    <span></span><span></span><span></span><span></span><span></span>
</div>

<div class="app-container">

    <div id="panel-awal" class="panel active">
        <h1 class="portal-title">E-LIBRARY</h1>

        <div class="menu-main">
            <button class="btn-primary">PINJAM BUKU</button>
            <button class="btn-secondary">ADMINISTRATOR</button>
        </div>
    </div>

</div>

</body>
</html>
