<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-LIBRARY | SMAN 1 Lemahabang</title>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glow-bg"></div>

    <div class="app-container" id="main-container">
        <div id="panel-awal" class="panel active">
            
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 20px; padding: 0 10px;">
                <img src="https://tareqwavlgqoexxffuuc.supabase.co/storage/v1/object/sign/Photo/SMANSALA.png?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV9kNWIxNTEyZS03YTE5LTQzY2UtYWUxNC00ZmRkNzMyZmIyODMiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJQaG90by9TTUFOU0FMQS5wbmciLCJpYXQiOjE3Nzg2NTQyNDksImV4cCI6MTgxMDE5MDI0OX0.ckUuob6XAPPIwfqqaqdBP2K27eY2aZ7ZTnWeMNDewVI" 
                     alt="Logo SMANSALA" 
                     style="width: 70px; height: auto;">
                
                <header style="flex: 1; text-align: center;">
                    <h1 class="portal-title" style="font-size: 24px; margin: 0;">E-LIBRARY</h1>
                </header>

                <img src="https://tareqwavlgqoexxffuuc.supabase.co/storage/v1/object/sign/Photo/PERPUS.jpg?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV9kNWIxNTEyZS03YTE5LTQzY2UtYWUxNC00ZmRkNzMyZmIyODMiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJQaG90by9QRVJQVVMuanBnIiwiaWF0IjoxNzc4NjU1MzI5LCJleHAiOjE4MTAxOTEzMjl9.07LFFMnUSmN0MXuhK2f_F6xYB7fbn0wc1_AMbmTX0ss" 
                     alt="Logo PERPUS" 
                     style="width: 70px; height: auto; border-radius: 50%;">
            </div>
            
            <div class="instansi-box" style="text-align: center;">
                <div class="instansi-main">SMAN 1 LEMAHABANG</div>
                <div class="instansi-sub">KABUPATEN CIREBON</div>
                
                <div class="running-text-container" style="background: rgba(37, 99, 235, 0.1); border-radius: 20px; margin-top: 15px; padding: 8px; overflow: hidden;">
                    <marquee style="color: #2563eb; font-size: 11px; font-weight: bold; letter-spacing: 1px;">
                        -- SMAN 1 LEMAHABANG -- LA, BERPRESTASI MENUJU SEKOLAH JUARA -- DIGITAL LIBRARY SYSTEM --
                    </marquee>
                </div>
            </div>
            
            <button class="btn-primary" onclick="switchPanel('panel-absen')">PINJAM BUKU</button>
            <button class="btn-secondary" onclick="switchPanel('panel-pengelola')">ADMINISTRATOR</button>
        </div>

        <div id="panel-absen" class="panel">
            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 15px; padding: 0 5px;">
                <img src="https://tareqwavlgqoexxffuuc.supabase.co/storage/v1/object/sign/Photo/SMANSALA.png?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV9kNWIxNTEyZS03YTE5LTQzY2UtYWUxNC00ZmRkNzMyZmIyODMiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJQaG90by9TTUFOU0FMQS5wbmciLCJpYXQiOjE3Nzg2NTQyNDksImV4cCI6MTgxMDE5MDI0OX0.ckUuob6XAPPIwfqqaqdBP2K27eY2aZ7ZTnWeMNDewVI" 
                     alt="Logo SMANSALA" style="width: 50px;">
                
                <div style="text-align: center;">
                    <h2 class="judul-absen" style="margin: 0; font-size: 18px;">Form Peminjaman</h2>
                    <p class="sub-absen" style="margin: 0; font-size: 12px;">SMAN 1 LEMAHABANG</p>
                </div>

                <img src="https://tareqwavlgqoexxffuuc.supabase.co/storage/v1/object/sign/Photo/PERPUS.jpg?token=eyJraWQiOiJzdG9yYWdlLXVybC1zaWduaW5nLWtleV9kNWIxNTEyZS03YTE5LTQzY2UtYWUxNC00ZmRkNzMyZmIyODMiLCJhbGciOiJIUzI1NiJ9.eyJ1cmwiOiJQaG90by9QRVJQVVMuanBnIiwiaWF0IjoxNzc4NjU1MzI5LCJleHAiOjE4MTAxOTEzMjl9.07LFFMnUSmN0MXuhK2f_F6xYB7fbn0wc1_AMbmTX0ss" 
                     alt="Logo PERPUS" style="width: 50px; border-radius: 50%;">
            </div>

            <div class="form-group">
                <label>Pilih Kelas</label>
                <select id="kelas" class="input-field">
                    <option value="">-- Pilih Kelas --</option>
                    <optgroup label="Kelas X">
                        <option>X.1</option><option>X.2</option><option>X.3</option><option>X.4</option><option>X.5</option>
                        <option>X.6</option><option>X.7</option><option>X.8</option><option>X.9</option><option>X.10</option>
                    </optgroup>
                    <optgroup label="Kelas XI">
                        <option>XI.F1</option><option>XI.F2</option><option>XI.F3</option><option>XI.F4</option><option>XI.F5</option>
                        <option>XI.F6</option><option>XI.F7</option><option>XI.F8</option><option>XI.F9</option><option>XI.F10</option>
                    </optgroup>
                </select>
            </div>
            
            <div class="form-group">
                <label>Nama Lengkap</label>
                <input type="text" id="nama-siswa" class="input-field" placeholder="Nama sesuai absen...">
            </div>

            <div class="form-group">
                <label>Judul Buku</label>
                <input type="text" id="judul-buku" class="input-field" placeholder="Judul buku...">
            </div>

            <div class="form-group">
                <label>Tanggal Pinjam</label>
                <input type="date" id="tgl-pinjam" class="input-field" onchange="hitungBatasKembali()">
            </div>

            <div class="form-group">
                <label>Batas Pengembalian</label>
                <input type="text" id="tgl-batas" class="input-field" readonly style="background: #f1f5f9; font-weight: bold; color: #2563eb;">
            </div>

            <button class="btn-primary" onclick="mintaPersetujuan()" style="margin-top: 20px;">KIRIM PENGAJUAN</button>
            <button class="btn-text" onclick="switchPanel('panel-awal')">Batalkan</button>
        </div>

        <div id="panel-pengelola" class="panel">
            <h2 class="panel-title">Akses Administrator</h2>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="admin-pass" placeholder="Password..." class="input-field">
            </div>
            <button class="btn-primary" onclick="loginUmum()">MASUK</button>
            <button class="btn-text" onclick="switchPanel('panel-awal')">KEMBALI</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
